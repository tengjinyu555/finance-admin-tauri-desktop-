stages:
  - build

build-windows:
  stage: build
  image: node:20
  script:
    # 安装Rust
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    # 安装Windows交叉编译工具
    - apt-get update && apt-get install -y gcc-mingw-w64-x86-64
    - rustup target add x86_64-pc-windows-msvc
    # 安装依赖
    - npm install
    # 构建前端
    - npm run build
    # 构建Tauri（仅构建Rust部分，跳过打包）
    - cd src-tauri && cargo build --release --target x86_64-pc-windows-msvc || true
  artifacts:
    paths:
      - src-tauri/target/
    expire_in: 7 days
